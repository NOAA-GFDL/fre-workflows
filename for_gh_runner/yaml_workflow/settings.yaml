# directories shared across tools
directories:
  history_dir:        "/mnt/history"
  refined_history_dir: "/mnt2/refined_history"
  pp_dir:             "/mnt/pp"
#  analysis_dir:       !join [/nbhome/$USER/, *FRE_STEM, /, *name]
  ptmp_dir:           "/mnt/ptmp"

postprocess:
  settings:
    history_segment:         "P1Y"
    site:                    "ppp-container"
    pp_chunks:               [*PP_CHUNK96]
    pp_start:                *EXP_AMIP_START
    pp_stop:                 *EXP_AMIP_END
    pp_grid_spec:            *GRID_SPEC96
  switches:
    clean_work:              True
    do_atmos_plevel_masking: True
    do_analysis:             False
    do_analysis_only:        False
  preanalysis:
    vitals:
      script: "/contrib-efs/fre-workflows-runners/actions-runner-1/_work/fre-workflows/fre-workflows/for_gh_runner/dummy_preanalysis.csh"
      inputs: ['atmos_month', 'aerosol_month']
      do_preanalysis: True
  refinediag:
    ocean:
      script: "/contrib-efs/fre-workflows-runners/actions-runner-1/_work/fre-workflows/fre-workflows/for_gh_runner/dummy_refinediag_ocean.sh"
      inputs: ['ocean_monthly', 'ocean_bgc']
      outputs: ['ocean_refined']
      do_refinediag: False
    aerosol:
      script: "/contrib-efs/fre-workflows-runners/actions-runner-1/_work/fre-workflows/fre-workflows/for_gh_runner/dummy_refinediag_aerosol.sh"
      inputs: ['aerosol_month']
      outputs: ['aerosol_refined']
      do_refinediag: False
